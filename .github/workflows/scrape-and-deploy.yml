name: Scrape & Deploy

on:
  schedule:
    # 每天 2 次: 00:00/12:00 UTC (北京时间 08:00/20:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    name: 抓取数据 & 部署
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scraper
        run: node scripts/scrape.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit updated data
        run: |
          if ! git diff --quiet data/shows.json data/image_cache.json data/discovery.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/shows.json data/image_cache.json data/discovery.json
            git commit -m "chore: update show data $(date -u '+%Y-%m-%d %H:%M')" || true
            for i in 1 2 3; do
              if git pull --rebase origin main; then
                git push origin main && break
              else
                # Resolve data file conflicts: keep our (freshly scraped) version
                # During rebase: --theirs = our local commit, --ours = remote
                git checkout --theirs data/shows.json data/image_cache.json data/discovery.json 2>/dev/null || true
                git add data/shows.json data/image_cache.json data/discovery.json
                GIT_EDITOR=true git rebase --continue || true
                git push origin main && break
              fi
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Clean up non-site files
        run: |
          rm -rf .github scripts .git data/history.json data/image_cache.json .gitignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
