name: Scrape & Deploy

on:
  schedule:
    # 每小时整点执行 (UTC时间)
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    name: 抓取数据 & 部署
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scraper
        run: node scripts/scrape.mjs

      - name: Commit updated data
        run: |
          if ! git diff --quiet data/shows.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/shows.json
            git commit -m "chore: update show data $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Clean up non-site files
        run: |
          rm -rf .github scripts .git data/history.json .gitignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
