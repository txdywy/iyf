<!DOCTYPE html>

  <meta name="theme-color" content="#0f0f13">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="剧荒救星">
  <meta property="og:title" content="剧荒救星 — 韩剧 & 2026轻松搞笑综艺推荐">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="剧荒救星 — 韩剧 & 2026轻松搞笑综艺推荐">
  <meta name="twitter:description" content="精选韩剧和国内轻松搞笑综艺推荐,2026新综实时追踪,轻松搞笑不踩雷">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 头部 -->
    <header class="header">
      <div class="container">
        <h1 class="logo">🎬 剧荒救星</h1>
        <p class="subtitle">韩剧精选 & 2026轻松搞笑新综追踪 · 剧荒救星</p>
        <div class="update-info" id="updateInfo">加载中...</div>
      </div>
    </header>

    <!-- 导航标签 -->
    <nav class="tabs" aria-label="内容分类">
      <div class="container" role="tablist">
        <button class="tab active" data-tab="korean" role="tab" aria-selected="true">🇰🇷 韩剧推荐</button>
        <button class="tab" data-tab="year2026" role="tab" aria-selected="false">🔥 2026新剧</button>
        <button class="tab" data-tab="variety2026" role="tab" aria-selected="false">😂 2026新综艺</button>
        <button class="tab" data-tab="variety" role="tab" aria-selected="false">🎬 全部综艺</button>
        <button class="tab" data-tab="new" role="tab" aria-selected="false">🆕 最新更新</button>
        <button class="tab" data-tab="classic" role="tab" aria-selected="false">🏆 经典必看</button>
      </div>
    </nav>

    <!-- 筛选栏 -->
    <div class="filters">
      <div class="container">
        <div class="filter-row">
          <div class="filter-group">
            <label>状态</label>
            <select id="filterStatus">
              <option value="all">全部</option>
              <option value="ongoing">连载中</option>
              <option value="complete">已完结</option>
            </select>
          </div>
          <div class="filter-group">
            <label>评分</label>
            <select id="filterScore">
              <option value="0">不限</option>
              <option value="7">7分以上</option>
              <option value="8">8分以上</option>
              <option value="9">9分以上</option>
            </select>
          </div>
          <div class="filter-group">
            <label>排序</label>
            <select id="sortBy">
              <option value="recommend">推荐优先</option>
              <option value="score">评分最高</option>
              <option value="newest">最新发布</option>
              <option value="popular">最多播放</option>
            </select>
          </div>
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索剧名/演员..." aria-label="搜索剧名或演员">
          </div>
        </div>
      </div>
    </div>

    <!-- 统计栏 -->
    <div class="stats-bar">
      <div class="container">
        <div class="stat-item">
          <span class="stat-num" id="statTotal">0</span>
          <span class="stat-label">推荐总数</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="statOngoing">0</span>
          <span class="stat-label">正在连载</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="statComplete">0</span>
          <span class="stat-label">已完结</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="statHighScore">0</span>
          <span class="stat-label">高分佳作</span>
        </div>
      </div>
    </div>

    <!-- 内容区域 -->
    <main class="content">
      <div class="container">
        <div class="show-grid" id="showGrid" role="tabpanel" aria-label="推荐结果">
          <!-- JS 动态渲染 -->
        </div>
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>正在加载推荐数据...</p>
        </div>
        <div class="empty" id="empty" style="display:none">
          <p>😢 暂无符合条件的推荐</p>
        </div>
      </div>
    </main>

    <!-- 底部 -->
    <footer class="footer">
      <div class="container">
        <p>数据来源: 爱壹帆 · 每日自动更新 · 仅供个人学习使用</p>
        <p class="footer-note">推荐算法基于评分、人气、类型偏好综合计算</p>
      </div>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
